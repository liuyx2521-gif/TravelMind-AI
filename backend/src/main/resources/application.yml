server:
  port: 8081

spring:
  application:
    name: travelmind-ai
  config:
    import:
      - optional:file:.env.local[.properties]
      - optional:file:../.env.local[.properties]
      - optional:file:../frontend/.env.local[.properties]
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:travelmind_ai}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:travelmind-ai-jwt-secret-key-32bytes!!}
    expire-seconds: 604800
  ai:
    provider: ${AI_PROVIDER:deepseek}
    base-url: ${AI_BASE_URL:https://api.deepseek.com}
    api-key: ${AI_API_KEY:${DEEPSEEK_API_KEY:}}
    model: ${AI_MODEL:deepseek-chat}
    local-base-url: ${AI_LOCAL_BASE_URL:http://localhost:11434}
    local-model: ${AI_LOCAL_MODEL:qwen3.5:0.8b}
  amap:
    key: ${AMAP_WEB_KEY:${AMAP_KEY:}}
  upload:
    dir: ${UPLOAD_DIR:D:/Codex/project/backend/uploads}
