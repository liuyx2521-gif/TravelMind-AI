services:
  mysql:
    image: mysql:8.0
    container_name: travelmind-mysql-local
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DB:-travelmind_ai}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-local-data:/var/lib/mysql

  redis:
    image: redis:7.2-alpine
    container_name: travelmind-redis-local
    ports:
      - "6379:6379"
    volumes:
      - redis-local-data:/data

volumes:
  mysql-local-data:
  redis-local-data:
