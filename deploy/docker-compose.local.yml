services:
  mysql:
    image: mysql:8.0
    container_name: travelmind-mysql-local
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DB:-travelmind_ai}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-local-data:/var/lib/mysql

  redis:
    image: redis:7.2-alpine
    container_name: travelmind-redis-local
    ports:
      - "6379:6379"
    volumes:
      - redis-local-data:/data

  minio:
    image: minio/minio:latest
    container_name: travelmind-minio-local
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-local-data:/data

volumes:
  mysql-local-data:
  redis-local-data:
  minio-local-data:
